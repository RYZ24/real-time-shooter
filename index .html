<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Quiz Shooter — Student PRO</title>
<style>
body{margin:0;font-family:system-ui;background:#004d40;color:#fff;overflow:hidden; touch-action:none;}
#joinScreen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000c;z-index:1000;}
#joinBox{background:#fff;color:#000;padding:20px;border-radius:12px;max-width:320px;width:90%;text-align:center;}
#joinBox input{width:80%;padding:12px;margin:10px 0;border-radius:6px;border:1px solid #999; font-size: 16px;}
#joinBox button{width:85%;padding:12px;background:#007bff;color:#fff;border:0;border-radius:6px;font-weight:700;cursor:pointer; font-size: 16px;}
#stage{position:relative;width:100%;height:100vh;background:linear-gradient(#00695c,#004d40);}
#top3Box{position:absolute;top:60px;left:10px;background:rgba(0,0,0,0.7);padding:10px;border-radius:10px;font-size:13px;z-index:500;border:1px solid #ffd700; min-width:160px;}
#hud{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.5);padding:8px 12px;border-radius:8px;z-index:500;}
#lbBtn{position:absolute;top:10px;right:10px;z-index:600;padding:6px 12px;border-radius:8px;border:none;background:#ff9800;color:#000;font-weight:bold;}
#userCountBadge{background: #000; color: #fff; padding: 1px 6px; border-radius: 10px; font-size: 11px;}
#leaderboardPanel{position:fixed;bottom:0;left:0;width:100%;height:260px;background:#000d;display:none;z-index:700;padding:15px;overflow-y:auto;border-top:3px solid #ff9800;}
#player{position:absolute;left:80px;bottom:80px;width:90px;height:140px;z-index:90;cursor:grab; touch-action: none;}
.boy{width:90px;height:140px;border-radius:12px;background-image:url('https://media.giphy.com/media/3oEduQAsYcJKQH2XsI/giphy.gif');background-size:cover;}
.led { position: absolute; width: 240px; background: #fff; border: 4px solid red; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; font-weight: 700; min-height: 80px; height: auto; padding: 8px 5px; text-align: center; cursor: grab; touch-action: none; user-select: none; overflow: hidden; }
.led .text { width: 100%; line-height: 1.2; word-wrap: break-word; white-space: normal; }
.led.q{border-color:#1e88e5;}
.bullet{position:absolute;width:12px;height:18px;background:yellow;border:2px solid #000;border-radius:4px;z-index:120;transform:translate(-50%,-50%);}
#msgOverlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);color:red;padding:40px;border-radius:12px;display:none;z-index:999;font-size:32px;font-weight:bold;text-align:center;border:4px solid red; width: 80%;}

/* Blast GIF Animation (Polio Fixed) */
.blast-style { 
    background-image: url('https://media.giphy.com/media/3ohhwfWReZHCW6K76w/giphy.gif') !important; 
    background-size: cover !important;
    background-position: center !important;
    color: transparent !important;
    transform: scale(1.1);
    border-color: orange !important;
}
</style>
</head>
<body>

<div id="joinScreen">
  <div id="joinBox">
    <h3>Join Quiz</h3>
    <input type="text" id="studentName" placeholder="Enter Your Name">
    <button id="btnJoin" onclick="joinGame()">Join Quiz Now</button>
  </div>
</div>

<div id="stage">
  <div id="hud">Score: <span id="score">0</span> | Q: <span id="qIndex">0</span>/<span id="qTotal">0</span>
    <div id="liveTimer" style="color:#ffeb3b; font-size:12px;">Time: --:--</div>
  </div>
  <div id="top3Box"><b style="color:#ffd700;">TOP 3 PRIZES</b><div id="top3List"></div></div>
  <button id="lbBtn" onclick="toggleLeaderboard()">Leaderboard <span id="userCountBadge">0</span></button>
  <div id="leaderboardPanel"><ul id="lbList"></ul></div>
  
  <div id="player"><div class="boy"></div></div>
  <div class="led q" id="ledQ" style="left:calc(50% - 120px);top:30px;"><div class="text">Loading...</div></div>
  <div class="led" id="ledA" style="left:20px;top:150px;"><div class="text">--</div></div>
  <div class="led" id="ledB" style="left:calc(50% - 120px);top:150px;"><div class="text">--</div></div>
  <div class="led" id="ledC" style="left:20px;top:260px;"><div class="text">--</div></div>
  <div class="led" id="ledD" style="left:calc(50% - 120px);top:260px;"><div class="text">--</div></div>
  
  <div id="msgOverlay">QUIZ OVER</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA-qGO1eQy7ur8V0QTw6WPozV_oNq4kaik",
  authDomain: "live-multiplayer-quiz.firebaseapp.com",
  databaseURL: "https://live-multiplayer-quiz-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Sounds
const gunSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const blastSound = new Audio("https://actions.google.com/sounds/v1/cartoon/slap_cluck_clack.ogg");

let myName="", myScore=0, myKey="", currentQuestion=null, answered=false, globalTimeOver=false, shotLock=false, dragMoved=false;
let currentPrizes = ["...", "...", "..."];
let lastMinuteAnnounced = -1;

function speakText(txt) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'hi-IN'; msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
}

function joinGame(){
    myName = document.getElementById("studentName").value.trim();
    if(!myName) return;
    
    gunSound.play().then(()=>{gunSound.pause();gunSound.currentTime=0;});
    blastSound.play().then(()=>{blastSound.pause();blastSound.currentTime=0;});

    firebase.auth().signInAnonymously().then(user => {
        myKey = user.user.uid;
        document.getElementById("joinScreen").style.display = "none";
        speakText("Riyaz Sir ki superhit and interesting coaching me aapka swagat hai, dhanyawad." + myName);
        db.ref("students/"+myKey).update({index: 0});
        db.ref("scores/"+myKey).update({name: myName, score: 0, blocked: false});
        initListeners();
    });
}

function initListeners(){
    db.ref("prizes").on("value", snap => { if(snap.exists()) currentPrizes = snap.val(); });
    db.ref("scores/"+myKey+"/score").on("value", snap => {
        myScore = snap.val() || 0;
        document.getElementById("score").innerText = myScore;
    });
    db.ref("quizMeta").on("value", snap => {
        let m = snap.val();
        if(!m || !m.active) return;
        const tInt = setInterval(() => {
            let remMillis = m.endTime - Date.now();
            let remSeconds = Math.floor(remMillis / 1000);
            let remMinutes = Math.floor(remSeconds / 60);
            if (remSeconds > 0 && remSeconds % 60 === 0 && remMinutes !== lastMinuteAnnounced) {
                if (remMinutes > 1) { speakText(remMinutes + " minutes bache hain"); } 
                else if (remMinutes === 1) { speakText("One minute bacha hai"); }
                lastMinuteAnnounced = remMinutes;
            }
            if(remSeconds <= 0) { 
                globalTimeOver = true; 
                document.getElementById("msgOverlay").innerText = "TIME OVER";
                document.getElementById("msgOverlay").style.display = "block"; 
                speakText("Time Over ho gaya hai");
                clearInterval(tInt); 
            }
            document.getElementById("liveTimer").innerText = `Time: ${remMinutes}:${remSeconds%60<10?'0':''}${remSeconds%60}`;
        }, 1000);
    });
    db.ref("questions").on("value", qSnap => {
        let qs = qSnap.val() || [];
        db.ref("students/"+myKey+"/index").on("value", iSnap => {
            let idx = iSnap.val() || 0;
            if(idx >= qs.length && qs.length > 0) { 
                if(!globalTimeOver) {
                    document.getElementById("msgOverlay").innerText = "QUIZ OVER";
                    document.getElementById("msgOverlay").style.display = "block"; 
                    speakText("Quiz Over. " + myName + ", aapne saare sawal kar liye hain, dhanyawad.");
                }
                return; 
            }
            currentQuestion = qs[idx];
            if(currentQuestion){
                document.querySelector("#ledQ .text").innerText = currentQuestion.q;
                document.querySelector("#ledA .text").innerText = currentQuestion.options[0];
                document.querySelector("#ledB .text").innerText = currentQuestion.options[1];
                document.querySelector("#ledC .text").innerText = currentQuestion.options[2];
                document.querySelector("#ledD .text").innerText = currentQuestion.options[3];
                document.getElementById("qIndex").innerText = idx + 1;
                document.getElementById("qTotal").innerText = qs.length;
                answered = false;
            }
        });
    });
    db.ref("scores").on("value", snap => {
        let arr = [];
        snap.forEach(s => { if(!s.val().blocked) arr.push(s.val()); });
        arr.sort((a,b) => b.score - a.score);
        document.getElementById("userCountBadge").innerText = arr.length;
        document.getElementById("lbList").innerHTML = arr.map((v,i) => `<li>${i+1}. ${v.name}: ${v.score}</li>`).join("");
        let top3 = arr.slice(0,3);
        document.getElementById("top3List").innerHTML = top3.map((v,i) => `
            <div style="margin-top:5px; color:#fff; font-weight:bold;">
                ${i+1}. ${v.name} <span style="color:#00ff00;">(${currentPrizes[i] || '...'})</span>
            </div>
        `).join("");
    });
}

function makeDraggable(el){
    let ox=0, oy=0, isD=false;
    const stage = document.getElementById("stage");
    const start = (e) => {
        isD = true; dragMoved = false;
        const rect = el.getBoundingClientRect();
        const cX = e.clientX || e.touches[0].clientX;
        const cY = e.clientY || e.touches[0].clientY;
        ox = cX - rect.left; oy = cY - rect.top;
    };
    const move = (e) => {
        if(!isD) return; 
        dragMoved = true;
        const cX = e.clientX || e.touches[0].clientX;
        const cY = e.clientY || e.touches[0].clientY;
        const sRect = stage.getBoundingClientRect();
        let x = cX - sRect.left - ox;
        let y = cY - sRect.top - oy;
        x = Math.max(0, Math.min(x, stage.clientWidth - el.offsetWidth));
        y = Math.max(0, Math.min(y, stage.clientHeight - el.offsetHeight));
        el.style.left = x + "px"; el.style.top = y + "px";
    };
    el.addEventListener("mousedown", start); el.addEventListener("touchstart", start, {passive: false});
    document.addEventListener("mousemove", move); document.addEventListener("touchmove", move, {passive: false});
    document.addEventListener("mouseup", () => isD = false); document.addEventListener("touchend", () => isD = false);
}

makeDraggable(document.getElementById("player"));
document.querySelectorAll(".led").forEach(makeDraggable);

document.getElementById("player").addEventListener("mouseup", () => { if(!dragMoved) shootBullet(); });
document.getElementById("player").addEventListener("touchend", () => { if(!dragMoved) shootBullet(); });

function shootBullet(){
    if(shotLock || answered || globalTimeOver || !currentQuestion) return;
    shotLock = true; setTimeout(() => shotLock = false, 400); 
    gunSound.currentTime = 0;
    gunSound.play();
    let b = document.createElement("div"); b.className = "bullet";
    let pR = document.getElementById("player").getBoundingClientRect();
    let sR = document.getElementById("stage").getBoundingClientRect();
    let x = pR.left + pR.width/2 - sR.left, y = pR.top - sR.top;
    b.style.left = x + "px"; b.style.top = y + "px";
    document.getElementById("stage").appendChild(b);
    let int = setInterval(() => {
        y -= 18; b.style.top = y + "px";
        let ids = ["ledA", "ledB", "ledC", "ledD"];
        for(let i=0; i<4; i++){
            let ledBox = document.getElementById(ids[i]);
            let r = ledBox.getBoundingClientRect();
            let br = b.getBoundingClientRect();
            if(!(br.right<r.left || br.left>r.right || br.bottom<r.top || br.top>r.bottom)){
                answered = true; clearInterval(int); b.remove();
                blastSound.currentTime = 0;
                blastSound.play();
                ledBox.classList.add("blast-style");
                setTimeout(() => ledBox.classList.remove("blast-style"), 400);
                if(i === currentQuestion.correct){
                    db.ref("scores/"+myKey).update({score: myScore + 1});
                    speakText("शाबाश " + myName);
                } else { speakText("गलत जवाब " + myName); }
                db.ref("students/"+myKey+"/index").once("value", s => db.ref("students/"+myKey).update({index: s.val()+1}));
                return;
            }
        }
        if(y < 0) { clearInterval(int); b.remove(); }
    }, 20);
}
function toggleLeaderboard(){ let l = document.getElementById("leaderboardPanel"); l.style.display = l.style.display==="none"?"block":"none"; }
</script>
</body>
</html>
